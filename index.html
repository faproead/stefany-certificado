<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Carteirinha - Stefany Rodrigues</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-box-sizing: border-box; }

  body {
    font-family: 'Montserrat', Arial, sans-serif;
    background: #e8e8e8;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: 16px;
  }

  .card-wrapper {
    width: 100%;
    max-width: 860px;
  }

  .card {
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: row;
    flex-direction: row;
    position: relative;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    -webkit-box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    background: radial-gradient(circle at 57% 59%,
        #1d5c80   0%,
        #1c5c84  4%,
        #1d5b82  10%,
        #1d5980  12%,
        #1d587e  14%,
        #1d567d  16%,
        #1d547a  18%,
        #1d5177  19%,
        #1c4d73  21%,
        #1c4a70  23%,
        #1c476d  25%,
        #1c4469  26%,
        #1c4268  31%,
        #1b3f66  33%,
        #1b3d64  35%,
        #1b3c63  37%,
        #1b3a61  39%,
        #1b3860  40%,
        #1b375f  45%,
        #1b365e  50%,
        #1b345c  60%
      );
    /* Proporção original: 860x268 = ~3.2:1 */
    aspect-ratio: 860 / 268;
  }

  .left {
    width: 36%;
    padding: 2% 2.3% 1.6%;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    gap: 0.9%;
    position: relative;
    z-index: 1;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
    justify-content: center;
  }

  .field-group { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 1px; margin-bottom: 0.3em; }

  .lbl {
    font-size: clamp(6px, 1.1vw, 9.5px);
    font-weight: 700;
    color: #8dc63f;
    letter-spacing: 0.3px;
  }

  .val {
    font-size: clamp(8px, 1.5vw, 13px);
    font-weight: 600;
    color: #ffffff;
  }

  .val-sm { font-size: clamp(7px, 1.4vw, 12px); }

  .divider {
    width: 1px;
    background: rgba(255,255,255,0.22);
    margin: 2% 0;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
    z-index: 1;
    -webkit-align-self: stretch;
    align-self: stretch;
  }

  .middle {
    width: 15%;
    padding: 2% 1.2% 1.2%;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-align-items: center;
    align-items: center;
    z-index: 1;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
    justify-content: center;
  }

  .photo {
    width: 65%;
    aspect-ratio: 88 / 108;
    border-radius: 9px;
    background: linear-gradient(160deg, #5a7fa0, #3a6080);
    overflow: hidden;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
    border: 1.5px solid rgba(255,255,255,0.25);
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    -o-object-fit: cover;
    object-position: center top;
  }

  .lbl-center {
    font-size: clamp(5px, 1vw, 8.5px);
    font-weight: 700;
    color: #8dc63f;
    text-align: center;
    margin-top: 5%;
    letter-spacing: 0.2px;
  }

  .val-center {
    font-size: clamp(6px, 1.4vw, 12px);
    font-weight: 600;
    color: #fff;
    text-align: center;
    margin-top: 2%;
  }

  .right {
    -webkit-flex: 1;
    flex: 1;
    padding: 2% 2.1% 1.6%;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-justify-content: center;
    justify-content: center;
    z-index: 1;
  }

  .course-block { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 2px; }

  .course-name {
    font-size: clamp(7px, 1.7vw, 14.5px);
    font-weight: 700;
    color: #fff;
    line-height: 1.35;
    margin-top: 2px;
  }

  .row { display: -webkit-flex; display: flex; gap: 4%; margin-top: 4%; }

  .tv-val {
    font-size: clamp(7px, 1.6vw, 14px);
    font-weight: 600;
    color: #fff;
    margin-top: 1px;
  }

  .logo-fapro {
    width: clamp(80px, 19.7%, 170px);
    display: block;
    margin-bottom: 4%;
  }
</style>
</head>
